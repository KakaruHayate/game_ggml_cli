name: ci

# Multi-platform build + oudep packaging for GAME-ggml CLI.
#
# Matrix:
#   linux-x64-vulkan   — Ubuntu, Vulkan backend
#   macos-arm64-metal  — Apple Silicon, Metal backend
#   macos-x64-metal    — Intel Mac, Metal backend (cross-compiled on ARM runner)
#   windows-x64-cpu    — Windows, CPU backend (Vulkan .exe uploaded separately)
#
# On tag push, artifacts are bundled into a GitHub Release.

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64-vulkan
            cmake_extra: "-DGAME_GGML_VULKAN=ON"
            pkg_ext: ""
            lib_glob: "libggml*.so*"

          - os: macos-14
            name: macos-arm64-metal
            cmake_extra: "-DGAME_GGML_METAL=ON -DCMAKE_OSX_ARCHITECTURES=arm64"
            pkg_ext: ""
            lib_glob: "libggml*.dylib"

          - os: macos-14
            name: macos-x64-metal
            cmake_extra: "-DGAME_GGML_METAL=ON -DCMAKE_OSX_ARCHITECTURES=x86_64"
            pkg_ext: ""
            lib_glob: "libggml*.dylib"

          - os: windows-latest
            name: windows-x64-vulkan
            cmake_extra: "-DGAME_GGML_VULKAN=ON"
            pkg_ext: ".exe"
            lib_glob: "ggml*.dll"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy gguf pyyaml

      - name: Install Vulkan SDK (Linux only)
        if: runner.os == 'Linux'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers,Vulkan-Loader
          vulkan-use-cache: true
      - name: Add glslc to PATH and fix VULKAN_SDK (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Find the actual glslc binary and update VULKAN_SDK to its parent.
          GLSC=$(find "${{ github.workspace }}"/_vulkan_build -name "glslc" -type f 2>/dev/null | head -1)
          if [ -z "$GLSC" ]; then
            GLSC=$(find "${{ github.workspace }}" -name "glslc" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$GLSC" ]; then
            BIN_DIR=$(dirname "$GLSC")
            SDK_ROOT=$(cd "$BIN_DIR/.." && pwd)
            echo "VULKAN_SDK=$SDK_ROOT" >> "$GITHUB_ENV"
            echo "$BIN_DIR" >> "$GITHUB_PATH"
            echo "VULKAN_SDK=$SDK_ROOT (glslc=$GLSC)"
          else
            echo "::error::glslc not found after Vulkan SDK install"
            exit 1
          fi
          which glslc && glslc --version

          # macos-x64-metal: disable native CPU detection for cross-compile
      - name: Disable native CPU for cross-compile (macOS x86_64 only)
        if: matrix.name == 'macos-x64-metal'
        shell: bash
        run: |
          echo "GGML_NATIVE=OFF" >> "$GITHUB_ENV"

      - name: Install Vulkan SDK (Windows only)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers,Vulkan-Loader
          vulkan-use-cache: true
      - name: Add glslc to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Find glslc.exe in the SDK tree or VULKAN_SDK.
          $vulkan = [Environment]::GetEnvironmentVariable('VULKAN_SDK')
          if (-not $vulkan -or -not (Test-Path $vulkan)) {
            $vulkan = Get-ChildItem 'C:\VulkanSDK' -Directory -ErrorAction SilentlyContinue
              | Sort-Object Name -Descending | Select-Object -First 1
          }
          if ($vulkan) {
            Write-Host "VULKAN_SDK=$vulkan"
            $bin = Join-Path $vulkan 'Bin'
            if (Test-Path (Join-Path $bin 'glslc.exe')) {
              echo "VULKAN_SDK=$vulkan" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              echo "$bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Get-Command glslc | Select-Object Source
            } else {
              Write-Host "glslc not found in $bin, searching recursively..."
              $found = Get-ChildItem -Recurse -Filter 'glslc.exe' -Path $vulkan -ErrorAction SilentlyContinue
                | Select-Object -First 1
              if ($found) {
                $bin = $found.DirectoryName
                echo "$bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
                Get-Command glslc | Select-Object Source
              } else {
                Write-Error "glslc.exe not found under VULKAN_SDK"
                exit 1
              }
            }
          } else {
            Write-Error "Vulkan SDK not found"
            exit 1
          }

      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('cmake/Dependencies.cmake') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Configure
        run: |
          cmake -S . -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DGAME_GGML_BUILD_CLI=ON \
                -DGAME_GGML_BUILD_TESTS=OFF \
                ${GGML_NATIVE:+-DGGML_NATIVE=$GGML_NATIVE} \
                ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build -j --config Release

      - name: Verify binary
        run: |
          ls -la build/bin/
          build/bin/game_ggml_cli${{ matrix.pkg_ext }} --version || true

      - name: Package .oudep
        run: |
          set -euo pipefail
          BIN="game_ggml_cli${{ matrix.pkg_ext }}"
          PKG="game_ggml-${{ matrix.name }}"
          mkdir -p "$PKG"

          # CLI binary
          cp "build/bin/$BIN" "$PKG/"

          # Shared libraries
          find build/bin -maxdepth 1 -name "${{ matrix.lib_glob }}" -exec cp {} "$PKG/" \;

          # macOS: include pre-compiled Metal shader cache if present
          if [ "${{ runner.os }}" = "macOS" ]; then
            find build -name "default.metallib" -exec cp {} "$PKG/" \; 2>/dev/null || true
          fi

          # oudep manifest
          cat > "$PKG/oudep.yaml" <<EOF
          id: game-ggml-medium
          version: 0.1.0
          description: GAME GGML inference engine (${{ matrix.name }}) + medium GGUF weights
          entrypoints:
            - loader: Executable
              path: $BIN
          EOF

          ls -la "$PKG/"
          echo "PKG_DIR=$PKG" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_DIR }}
          path: ${{ env.PKG_DIR }}
          if-no-files-found: error
          retention-days: 30

  # Windows x64 Vulkan (.exe) is built locally and uploaded manually to the
  # release.  This job downloads the locally-built artifact from the release
  # and re-bundles it alongside the CI-built packages.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download local Windows Vulkan artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/download-artifact@v4
        with:
          name: game_ggml-windows-x64-vulkan
          path: artifacts
        continue-on-error: true

      - name: Re-package all artifacts as .oudep
        run: |
          set -euo pipefail
          cd artifacts
          # Each top-level dir is a platform package already containing
          # the binary + libs + oudep.yaml.  Zip it.
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.oudep.zip" "$dir"
          done
          cd ..
          ls -la *.zip
          echo "ARTIFACTS_COUNT=$(ls *.zip 2>/dev/null | wc -l)" >> "$GITHUB_ENV"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          fail_on_unmatched_files: false  # tolerate missing local Windows upload
